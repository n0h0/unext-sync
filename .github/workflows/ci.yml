name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Lint, Format & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "11.5.2"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm biome ci .

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Test
        run: pnpm test
